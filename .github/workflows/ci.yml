name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Formatting
        run: cargo xtask ci fmt

  clippy:
    name: Clippy
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Dioxus desktop system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Clippy
        run: cargo xtask ci clippy

  check:
    name: Workspace Check
    needs: [fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Dioxus desktop system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Workspace Check
        run: cargo xtask ci check

  unit:
    name: Unit Tests
    needs: [check, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Unit Tests
        run: cargo xtask ci unit

  release:
    name: Release Verification
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Release Verification
        run: cargo xtask ci release

  integration:
    name: Integration Tests
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Integration Tests
        run: cargo xtask ci integration

  adapter:
    name: Adapter Tests
    needs: [integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Dioxus desktop system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - name: Adapter Tests
        run: cargo xtask ci adapter

  coverage:
    name: Coverage
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-llvm-cov --locked
      - name: Coverage
        run: cargo xtask ci coverage
      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  feature-flags-core:
    name: Feature Flags — Core
    needs: [adapter]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: feature-flags
      - name: Feature Flags — Core
        run: cargo xtask ci feature-matrix-core

  feature-flags-i18n:
    name: Feature Flags — I18n
    needs: [adapter]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: feature-flags
      - name: Feature Flags — I18n
        run: cargo xtask ci feature-matrix-i18n

  feature-flags-subsystems:
    name: Feature Flags — Subsystems
    needs: [adapter]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: feature-flags
      - name: Feature Flags — Subsystems
        run: cargo xtask ci feature-matrix-subsystems

  feature-flags-leptos:
    name: Feature Flags — Leptos
    needs: [adapter]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: feature-flags
      - name: Feature Flags — Leptos
        run: cargo xtask ci feature-matrix-leptos

  feature-flags-dioxus:
    name: Feature Flags — Dioxus
    needs: [adapter]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: feature-flags
      - name: Install Dioxus desktop system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - name: Feature Flags — Dioxus
        run: cargo xtask ci feature-matrix-dioxus

  feature-flag-check:
    name: Feature Flag Check
    needs:
      - feature-flags-core
      - feature-flags-i18n
      - feature-flags-subsystems
      - feature-flags-leptos
      - feature-flags-dioxus
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enforce feature matrix success
        run: |
          results=(
            "${{ needs.feature-flags-core.result }}"
            "${{ needs.feature-flags-i18n.result }}"
            "${{ needs.feature-flags-subsystems.result }}"
            "${{ needs.feature-flags-leptos.result }}"
            "${{ needs.feature-flags-dioxus.result }}"
          )
          for result in "${results[@]}"; do
            if [ "$result" != "success" ]; then
              echo "Feature flag check failed: $result"
              exit 1
            fi
          done
          echo "All feature flag jobs passed"
